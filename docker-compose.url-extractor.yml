version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - writeitout-network

  url-extractor:
    build:
      context: backend/cmd/url-extractor
      dockerfile: Dockerfile
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - STORAGE_SERVICE_URL=http://api-gateway:8080/api
      - API_GATEWAY_URL=http://api-gateway:8080/api
    depends_on:
      - redis
    networks:
      - writeitout-network
    volumes:
      - /tmp/url_extractor:/tmp/url_extractor
    restart: unless-stopped

  # Note: This assumes your existing API gateway service is running
  # You can add it here if needed
  # api-gateway:
  #   build:
  #     context: backend
  #     dockerfile: cmd/api/Dockerfile
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     - REDIS_ADDR=redis:6379
  #     - DATABASE_URL=${DATABASE_URL}
  #     - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
  #   depends_on:
  #     - redis
  #   networks:
  #     - writeitout-network

volumes:
  redis_data:

networks:
  writeitout-network:
    driver: bridge
